title: POSTECH AeroSpace Initiatives
description: POSTECH AeroSpace Initiatives (PSI) is a student aerospace research club at POSTECH developing rockets, avionics, propulsion test systems, and flight operations capability.
url: "https://postech-psi.github.io"
baseurl: "/psi-website"
lang: en

author:
  name: POSTECH AeroSpace Initiatives
  email: "uikangee@postech.ac.kr"

markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - README.md
  - tools/
  - docs/

collections:
  projects:
    output: true
  team:
    output: true

navigation:
  - title: Home
    title_ko: Home
    title_en: Home
    url: /
  - title: Mission
    title_ko: Mission
    title_en: Mission
    url: /about
  - title: Projects
    title_ko: Projects
    title_en: Projects
    url: /projects
  - title: Team
    title_ko: Team
    title_en: Team
    url: /team
  - title: Trajectory
    title_ko: Trajectory
    title_en: Trajectory
    url: /events
  - title: Shop
    title_ko: Shop
    title_en: Shop
    url: /shop
  - title: Join
    title_ko: Join
    title_en: Join
    url: /contact

theme: minima
github: [metadata]
