title: POSTECH AeroSpace Initiatives
description: POSTECH AeroSpace Initiatives (PSI) is a student aerospace research club at POSTECH developing rockets, avionics, propulsion test systems, and flight operations capability.
url: "https://postech-psi.github.io"
baseurl: "/psi-website"
lang: ko

author:
  name: POSTECH AeroSpace Initiatives
  email: "uikangee@postech.ac.kr"

markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - README.md
  - tools/
  - docs/

collections:
  projects:
    output: true
  team:
    output: true

navigation:
  - title: Home
    title_ko: 홈
    title_en: Home
    url: /
  - title: About
    title_ko: 미션
    title_en: Mission
    url: /about
  - title: Projects
    title_ko: 프로젝트
    title_en: Projects
    url: /projects
  - title: Team
    title_ko: 팀
    title_en: Team
    url: /team
  - title: Events
    title_ko: 궤적
    title_en: Trajectory
    url: /events
  - title: Contact
    title_ko: 참여
    title_en: Join
    url: /contact

theme: minima
github: [metadata]
