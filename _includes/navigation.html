<nav class="main-nav" aria-label="Primary navigation">
    <button class="mobile-menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-menu" data-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
    </button>
    <ul id="primary-menu" class="nav-menu" data-menu>
        {% for item in site.navigation %}
        {% assign item_url_slash = item.url | append: '/' %}
        <li>
            <a href="{{ item.url | relative_url }}" {% if page.url == item.url or page.url == item_url_slash %}class="active" aria-current="page"{% endif %}>
                {{ item.title_en }}
            </a>
        </li>
        {% endfor %}
    </ul>
</nav>
